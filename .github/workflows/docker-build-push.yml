name: Build and Push Docker Image

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MONGO_URI: "mongodb://mongo:27017"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Wait for MongoDB to be ready
        shell: bash
        run: |
          # find the mongo container ID (ancestor=mongo:6.0)
          container_id=$(docker ps -qf "ancestor=mongo:6.0")
          until docker exec "$container_id" mongosh --quiet --eval "db.adminCommand({ ping: 1 })"; do
            echo "Waiting for MongoDB to be healthy…"
            sleep 2
          done
          echo "MongoDB is up!"

      - name: Run tests
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: beskar18/book-club-bot:${{ github.ref_name }}

      - name: Tag as latest (release tags only, no pre-releases)
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          docker pull beskar18/book-club-bot:${{ github.ref_name }}
          docker tag beskar18/book-club-bot:${{ github.ref_name }} beskar18/book-club-bot:latest
          docker push beskar18/book-club-bot:latest

      - name: Trigger Railway sandbox redeploy
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 1230437c-b600-4a1e-abf8-095fe45256b4
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SANDBOX_SERVICE_ID }}
        run: |
          npm install -g @railway/cli@3
          railway redeploy --service "$RAILWAY_SERVICE_ID" --yes
